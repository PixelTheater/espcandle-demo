# 1. Copy this file to secrets.yaml (already gitignored).
# 2. Replace the placeholder values below with real credentials.
# 3. Add one block per physical candle - each MUST have unique
#    api_key and ota_password values per ESPHome security best practices
#    (https://esphome.io/guides/security_best_practices/).

# ---- Wi-Fi (shared across all candles) ---------------------------------
wifi_ssid: "YourWiFiNetworkName"
wifi_password: "YourWiFiPassword"

# Fallback AP password - used if Wi-Fi is unreachable.
# Generate with: openssl rand -hex 12
fallback_ap_password: "REPLACE_WITH_RANDOM_HEX"

# ---- Per-device secrets ------------------------------------------------
# One pair per candle. Naming convention: <substitutions.name with - as _>_api_key
# and _ota_password.
#
# Generate with:
#   echo "${name}_api_key:      \"$(openssl rand -base64 32)\""
#   echo "${name}_ota_password: \"$(openssl rand -hex 16)\""

candle_livingroom_api_key:      "REPLACE_WITH_OUTPUT_OF_openssl_rand_base64_32"
candle_livingroom_ota_password: "REPLACE_WITH_OUTPUT_OF_openssl_rand_hex_16"

# candle_kitchen_api_key:        "..."
# candle_kitchen_ota_password:   "..."
